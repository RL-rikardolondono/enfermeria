version: '3.9'

services:
  # ============================================================
  # Base de datos PostgreSQL con PostGIS
  # ============================================================
  postgres:
    image: postgis/postgis:16-3.4
    container_name: enfermeria_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: enfermeria_db
      POSTGRES_USER: enfermeria
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-enfermeria2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U enfermeria -d enfermeria_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ============================================================
  # Redis para caché, colas y WebSocket
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: enfermeria_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis2024} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ============================================================
  # API Backend Node.js
  # ============================================================
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: enfermeria_api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://enfermeria:${POSTGRES_PASSWORD:-enfermeria2024}@postgres:5432/enfermeria_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis2024}
      JWT_SECRET: ${JWT_SECRET:-cambiar-en-produccion}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3001}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ============================================================
  # Panel Admin Next.js
  # ============================================================
  admin:
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile
    container_name: enfermeria_admin
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://api:3000
      NEXT_PUBLIC_WS_URL: ws://api:3000
    ports:
      - "3001:3001"
    depends_on:
      - api

  # ============================================================
  # Nginx reverse proxy
  # ============================================================
  nginx:
    image: nginx:alpine
    container_name: enfermeria_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - admin

volumes:
  postgres_data:
  redis_data:
